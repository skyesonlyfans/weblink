<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebLink by Skye &lt;3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        body {
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            -webkit-tap-highlight-color: transparent;
        }

        .h-screen-ios {
            height: 100vh;
            height: -webkit-fill-available;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .pairing-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 0.98));
            max-width: calc(100vw - 32px);
        }

        #qrcode img {
            margin: 0 auto;
            border-radius: 12px;
            padding: 6px;
            background: white;
            max-width: 130px;
            height: auto;
        }

        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(236, 72, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Loader Animation */
        .progress-bar-fill {
            transition: width 3.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .gif-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .gif-grid img {
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gif-grid img:active { transform: scale(0.95); }
    </style>
</head>
<body class="h-screen-ios bg-slate-950 text-slate-100 font-sans overflow-hidden flex flex-col relative">

    <!-- 1. Bootloader / Update Checker Overlay -->
    <div id="boot-overlay" class="fixed inset-0 z-[200] bg-slate-950 flex flex-col items-center justify-center transition-opacity duration-1000">
        <i data-lucide="radio" class="w-14 h-14 text-pink-500 animate-pulse mb-6 pulse-ring rounded-full"></i>
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-indigo-400 tracking-[0.2em] uppercase mb-12">WebLink</h1>
        <div class="flex flex-col items-center space-y-4 w-64">
            <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden shadow-inner">
                <div id="boot-progress" class="h-full bg-gradient-to-r from-pink-500 to-indigo-500 w-0 progress-bar-fill"></div>
            </div>
            <p id="boot-text" class="text-[10px] text-slate-500 font-mono tracking-widest uppercase text-center h-4">Initializing Core...</p>
        </div>
    </div>

    <!-- Background Glow -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-pink-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 p-4 glass-panel flex justify-between items-center z-40 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-br from-pink-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-pink-500/20">
                <i data-lucide="radio" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-pink-300 to-indigo-300 bg-clip-text text-transparent">WebLink</h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="create-group-btn" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-full transition-colors border border-white/5" title="Create Group">
                <i data-lucide="users" class="w-5 h-5 text-pink-300"></i>
            </button>
            <button id="pairing-btn" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-full transition-colors border border-white/5" title="Pair Device">
                <i data-lucide="qr-code" class="w-5 h-5 text-indigo-300"></i>
            </button>
        </div>
    </header>

    <!-- Discovery Feed -->
    <main class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24 relative z-10">
        <div class="max-w-2xl mx-auto space-y-6">
            <div class="flex items-center justify-between px-1">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    Live Network
                </h2>
                <span id="network-count" class="text-[10px] font-bold text-slate-400">0 PEERS</span>
            </div>

            <!-- Active Groups List -->
            <div id="groups-grid" class="grid grid-cols-1 gap-3 empty:hidden mb-4"></div>
            <!-- Active Users List -->
            <div id="users-grid" class="grid grid-cols-1 gap-3"></div>

            <div id="empty-state" class="flex flex-col items-center justify-center py-16 text-slate-500 space-y-4">
                <i data-lucide="radar" class="w-10 h-10 text-slate-800 animate-spin-slow"></i>
                <div class="text-center">
                    <p class="text-sm font-medium">Scanning for devices & groups...</p>
                    <p class="text-[10px] text-slate-600 mt-1 uppercase tracking-wider">Use QR for non-local pairing</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Pairing Modal -->
    <div id="pairing-modal" class="fixed inset-0 z-[60] hidden bg-slate-950/90 backdrop-blur-xl p-4 flex items-center justify-center">
        <div class="pairing-card w-full rounded-[28px] p-5 border border-white/10 shadow-2xl flex flex-col space-y-5">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-black tracking-tight">Pairing Center</h3>
                <button id="close-pairing" class="p-2 bg-slate-800 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <div class="space-y-4 text-center">
                <div id="qrcode" class="mx-auto p-2 bg-white rounded-xl inline-block shadow-lg"></div>
                <div class="space-y-0.5">
                    <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest">Your Code</p>
                    <div id="pairing-code-text" class="text-3xl font-black tracking-[0.2em] text-indigo-400 font-mono">------</div>
                </div>

                <div class="pt-4 border-t border-white/5 space-y-3">
                    <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wide">Link Code / Group Code</p>
                    <div class="flex flex-col gap-2">
                        <input type="text" id="target-code-input" maxlength="8" 
                            class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-center text-xl font-mono tracking-[0.3em] focus:ring-2 focus:ring-pink-500 outline-none uppercase placeholder:tracking-normal placeholder:text-slate-700" 
                            placeholder="000000">
                        <button id="connect-code-btn" 
                            class="w-full bg-indigo-600 py-3 rounded-xl font-black hover:bg-indigo-500 active:scale-[0.97] transition-all text-xs uppercase tracking-widest shadow-lg shadow-indigo-600/20">
                            Confirm Link
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Slide-over -->
    <div id="chat-panel" class="fixed inset-0 z-50 transform translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] flex flex-col bg-slate-950">
        <div class="p-4 glass-panel border-b border-white/5 flex items-center justify-between sticky top-0">
            <div class="flex items-center gap-3">
                <button id="close-chat" class="p-2 -ml-2 text-slate-400"><i data-lucide="chevron-down"></i></button>
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-xs" id="chat-avatar">?</div>
                <div>
                    <h4 id="chat-username" class="font-bold text-sm leading-none">User</h4>
                    <p id="chat-subtitle" class="text-[9px] text-emerald-400 mt-1 uppercase font-black tracking-widest">Active Connection</p>
                </div>
            </div>
            <button id="call-btn" class="w-9 h-9 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center active:scale-90 transition-transform"><i data-lucide="phone" class="w-4 h-4"></i></button>
        </div>
        
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col no-scrollbar"></div>
        
        <!-- Attachment Tray -->
        <div id="attach-tray" class="hidden absolute bottom-20 left-4 bg-slate-800 p-2 rounded-2xl shadow-2xl border border-white/10 flex gap-2 z-50">
            <button id="tray-file-btn" class="p-3 bg-slate-700 hover:bg-slate-600 rounded-xl text-white transition-colors"><i data-lucide="file" class="w-5 h-5"></i></button>
            <button id="tray-gif-btn" class="p-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-white shadow-lg shadow-indigo-600/20 transition-colors"><i data-lucide="image" class="w-5 h-5"></i></button>
        </div>

        <div class="p-3 pb-8 border-t border-white/5 bg-slate-900/50 flex gap-2 items-center relative">
            <button id="attach-btn" class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-slate-400 shrink-0"><i data-lucide="plus"></i></button>
            <input type="file" id="file-input" class="hidden">
            <div class="flex-1 bg-slate-950 border border-white/10 rounded-2xl px-4 py-3">
                <input id="message-input" type="text" class="w-full bg-transparent outline-none text-sm" placeholder="Message...">
            </div>
            <button id="send-btn" class="w-12 h-12 bg-pink-600 rounded-2xl flex items-center justify-center shadow-lg shadow-pink-600/20 active:scale-90 transition-transform shrink-0"><i data-lucide="send" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- GIF Modal -->
    <div id="gif-modal" class="fixed inset-0 z-[70] hidden bg-slate-950/98 backdrop-blur-3xl flex flex-col transform translate-y-full transition-transform duration-300">
        <div class="p-4 glass-panel border-b border-white/5 flex items-center gap-3">
            <button id="close-gif" class="p-2 -ml-2 text-slate-400"><i data-lucide="x"></i></button>
            <div class="flex-1 bg-slate-900 border border-white/10 rounded-xl px-4 py-2 flex items-center gap-2">
                <i data-lucide="search" class="w-4 h-4 text-slate-500"></i>
                <input id="gif-search" type="text" class="w-full bg-transparent outline-none text-sm" placeholder="Search Tenor GIFs...">
            </div>
        </div>
        <div id="gif-results" class="flex-1 overflow-y-auto p-4 no-scrollbar gif-grid">
            <!-- GIFs inject here -->
            <div class="col-span-2 text-center text-slate-500 text-xs py-10">Type to search...</div>
        </div>
        <!-- Tenor branding requirement -->
        <div class="p-2 text-center border-t border-white/5"><img src="https://tenor.com/assets/img/tenor-logo-white.svg" class="h-4 mx-auto opacity-50" alt="Powered by Tenor"></div>
    </div>

    <!-- Login -->
    <div id="login-overlay" class="fixed inset-0 z-[100] hidden bg-slate-950 flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
        <div class="w-16 h-16 bg-gradient-to-tr from-pink-500 to-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl pulse-ring">
            <i data-lucide="radio" class="w-8 h-8 text-white"></i>
        </div>
        <h2 class="text-2xl font-black mb-1 tracking-tighter">WebLink</h2>
        <p class="text-slate-500 text-[11px] uppercase tracking-widest mb-10">Private Discovery</p>
        <form id="login-form" class="w-full max-w-xs space-y-3">
            <input type="text" id="username-input" required maxlength="12" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-4 text-center text-lg font-bold outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Your Name">
            <button type="submit" class="w-full py-4 bg-white text-black font-black rounded-xl active:scale-95 transition-transform uppercase tracking-widest text-[10px]">Initialize</button>
        </form>
    </div>

    <!-- Group/Multi Call Overlay -->
    <div id="call-overlay" class="fixed inset-0 z-[110] hidden bg-slate-950/98 backdrop-blur-3xl p-6 flex flex-col items-center justify-center space-y-8 overflow-y-auto no-scrollbar">
        <!-- Container for dynamically added audio elements -->
        <div id="call-audio-container" class="hidden"></div>
        
        <h3 id="call-name" class="text-2xl font-black text-center mt-10">Call</h3>
        <p id="call-status" class="text-slate-500 font-medium tracking-widest uppercase text-[10px] -mt-6">Connecting...</p>

        <!-- Grid for Avatars (supports multiple for groups) -->
        <div id="call-avatars" class="flex flex-wrap justify-center gap-6 max-w-sm py-8">
            <!-- Dynamic Avatars Inject Here -->
        </div>
        
        <div class="flex gap-8 pt-8 pb-10">
            <button id="end-call-btn" class="w-16 h-16 bg-rose-600 rounded-full flex items-center justify-center shadow-2xl shadow-rose-600/30 active:scale-90 transition-transform"><i data-lucide="phone-off" class="w-6 h-6 text-white"></i></button>
            <button id="accept-call-btn" class="hidden w-16 h-16 bg-emerald-600 rounded-full flex items-center justify-center shadow-2xl shadow-emerald-600/30 active:scale-90 transition-transform"><i data-lucide="phone" class="w-6 h-6 text-white"></i></button>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 left-4 right-4 z-[120] space-y-2 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDd5267BUf3xVrjvUsaHvXZBMCZ_dHxtt4",
            authDomain: "weblink-3cb66.firebaseapp.com",
            projectId: "weblink-3cb66",
            storageBucket: "weblink-3cb66.firebasestorage.app",
            messagingSenderId: "148181069266",
            appId: "1:148181069266:web:9d4f8b72d801b3af0eac0b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "weblink-v3";
        const TENOR_API_KEY = "LIVDSRZULELA"; // Standard public test key for Tenor V1 API

        // --- State ---
        let myUsername = "";
        let peer = null;
        let myPeerId = null;
        let my6DigitCode = "";
        
        let networkUsers = [];
        let activeGroups = {}; // Local cache of joined groups { groupId: { name, members } }
        let chatHistories = {}; // { targetId: [msg] }
        
        let currentChatTarget = null; // Either a peerId (string) or a groupId (string starting with 'G-')
        
        let localStream = null;
        let activeCalls = []; // Array to support group calls

        // --- DOM Cache ---
        const els = {
            bootOverlay: document.getElementById('boot-overlay'),
            bootProgress: document.getElementById('boot-progress'),
            bootText: document.getElementById('boot-text'),
            loginOverlay: document.getElementById('login-overlay'),
            loginForm: document.getElementById('login-form'),
            usernameInput: document.getElementById('username-input'),
            myUsernameDisplay: document.getElementById('my-username-display'),
            myProfile: document.getElementById('my-profile'),
            usersGrid: document.getElementById('users-grid'),
            groupsGrid: document.getElementById('groups-grid'),
            emptyState: document.getElementById('empty-state'),
            networkCount: document.getElementById('network-count'),
            createGroupBtn: document.getElementById('create-group-btn'),
            pairingBtn: document.getElementById('pairing-btn'),
            pairingModal: document.getElementById('pairing-modal'),
            closePairing: document.getElementById('close-pairing'),
            pairingCodeText: document.getElementById('pairing-code-text'),
            targetCodeInput: document.getElementById('target-code-input'),
            connectCodeBtn: document.getElementById('connect-code-btn'),
            chatPanel: document.getElementById('chat-panel'),
            closeChat: document.getElementById('close-chat'),
            chatUsername: document.getElementById('chat-username'),
            chatSubtitle: document.getElementById('chat-subtitle'),
            chatAvatar: document.getElementById('chat-avatar'),
            chatMessages: document.getElementById('chat-messages'),
            messageInput: document.getElementById('message-input'),
            sendBtn: document.getElementById('send-btn'),
            attachBtn: document.getElementById('attach-btn'),
            attachTray: document.getElementById('attach-tray'),
            trayFileBtn: document.getElementById('tray-file-btn'),
            trayGifBtn: document.getElementById('tray-gif-btn'),
            fileInput: document.getElementById('file-input'),
            gifModal: document.getElementById('gif-modal'),
            closeGif: document.getElementById('close-gif'),
            gifSearch: document.getElementById('gif-search'),
            gifResults: document.getElementById('gif-results'),
            callBtn: document.getElementById('call-btn'),
            callOverlay: document.getElementById('call-overlay'),
            callName: document.getElementById('call-name'),
            callStatus: document.getElementById('call-status'),
            callAvatars: document.getElementById('call-avatars'),
            callAudioContainer: document.getElementById('call-audio-container'),
            acceptCallBtn: document.getElementById('accept-call-btn'),
            endCallBtn: document.getElementById('end-call-btn'),
            toastContainer: document.getElementById('toast-container')
        };

        // --- 1. Bootloader System ---
        async function runBootSequence() {
            els.bootProgress.style.width = '100%';
            
            // Check for updates virtually
            const updates = ['update_1', 'update_2', 'update_3'];
            for (let u of updates) {
                try {
                    els.bootText.textContent = `Fetching ${u}.js...`;
                    await new Promise(r => {
                        let s = document.createElement('script');
                        s.src = `updates/${u}.js`;
                        s.onload = r; s.onerror = r; 
                        document.head.appendChild(s);
                        setTimeout(r, 600); // minimum delay for visual effect
                    });
                } catch(e){}
            }
            
            els.bootText.textContent = "System Ready.";
            
            setTimeout(() => {
                els.bootOverlay.style.opacity = '0';
                setTimeout(() => {
                    els.bootOverlay.classList.add('hidden');
                    // Show login if no username
                    if (!myUsername) {
                        els.loginOverlay.style.display = 'flex';
                        setTimeout(() => els.loginOverlay.style.opacity = '1', 50);
                    }
                }, 1000);
            }, 800);
        }

        // --- Utils ---
        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `p-3 rounded-xl ${type === 'error' ? 'bg-rose-500' : 'bg-slate-800'} text-white text-[10px] font-black uppercase tracking-widest shadow-2xl flex items-center gap-2 pointer-events-auto`;
            t.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'info'}" class="w-3 h-3"></i> ${msg}`;
            els.toastContainer.appendChild(t);
            lucide.createIcons();
            setTimeout(() => t.remove(), 3500);
        }

        // --- Initialization ---
        async function start() {
            runBootSequence(); // Start the bootloader UI
            await signInAnonymously(auth);
            onAuthStateChanged(auth, u => { if(u && myUsername) setupDiscovery(); });
        }

        els.loginForm.onsubmit = e => {
            e.preventDefault();
            myUsername = els.usernameInput.value.trim();
            els.loginOverlay.style.opacity = '0';
            setTimeout(() => els.loginOverlay.style.display = 'none', 500);
            els.myProfile.classList.remove('hidden');
            els.myUsernameDisplay.textContent = myUsername;
            initPeer();
        };

        function initPeer() {
            peer = new Peer(undefined, { debug: 1 });
            peer.on('open', id => {
                myPeerId = id;
                my6DigitCode = Math.floor(100000 + Math.random() * 900000).toString();
                els.pairingCodeText.textContent = my6DigitCode;
                new QRCode(document.getElementById("qrcode"), {
                    text: `${window.location.origin}${window.location.pathname}?code=${my6DigitCode}`, 
                    width: 120, height: 120, colorDark : "#0f172a", colorLight : "#ffffff"
                });
                
                announce();
                setInterval(announce, 15000);
                setupDiscovery(); // Start scanning
                
                // Auto-join via URL param
                const params = new URLSearchParams(window.location.search);
                if(params.get('code')) connectByCode(params.get('code'));
            });

            peer.on('connection', conn => {
                conn.on('data', data => handleIncomingData(conn.peer, data));
            });

            peer.on('call', call => handleIncomingCall(call));
        }

        async function announce() {
            if(!auth.currentUser || !myPeerId) return;
            const pRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'weblink_presence', auth.currentUser.uid);
            await setDoc(pRef, { uid: auth.currentUser.uid, username: myUsername, peerId: myPeerId, code: my6DigitCode, ts: Date.now() });
            
            const lRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'pairing_codes', my6DigitCode);
            await setDoc(lRef, { type: 'user', peerId: myPeerId, username: myUsername, ts: Date.now() });
        }

        // --- Discovery & Group Handling ---
        function setupDiscovery() {
            const col = collection(db, 'artifacts', APP_ID, 'public', 'data', 'weblink_presence');
            onSnapshot(col, snap => {
                const now = Date.now();
                networkUsers = [];
                snap.forEach(d => {
                    const data = d.data();
                    if(data.uid !== auth.currentUser.uid && (now - data.ts < 45000)) networkUsers.push(data);
                });
                renderNetwork();
            });
        }

        els.createGroupBtn.onclick = async () => {
            const gCode = "G-" + Math.floor(10000 + Math.random() * 90000).toString();
            const gRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'groups', gCode);
            
            const groupData = {
                id: gCode,
                name: `Group ${gCode}`,
                members: [{ peerId: myPeerId, username: myUsername }],
                ts: Date.now()
            };
            
            await setDoc(gRef, groupData);
            
            // Register lookup
            const lRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'pairing_codes', gCode);
            await setDoc(lRef, { type: 'group', groupId: gCode, ts: Date.now() });
            
            showToast(`Group Created: ${gCode}`);
            joinLocalGroup(groupData);
            openChat(gCode, groupData.name, true);
        };

        function joinLocalGroup(groupData) {
            activeGroups[groupData.id] = groupData;
            
            // Listen for others joining
            const gRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'groups', groupData.id);
            onSnapshot(gRef, snap => {
                if(snap.exists()) {
                    activeGroups[groupData.id] = snap.data();
                    if(currentChatTarget === groupData.id) renderSubtitle();
                }
            });
            renderNetwork();
        }

        function renderNetwork() {
            els.networkCount.textContent = `${networkUsers.length} PEERS`;
            els.emptyState.style.display = (networkUsers.length || Object.keys(activeGroups).length) ? 'none' : 'flex';
            
            // Render Groups
            els.groupsGrid.innerHTML = '';
            Object.values(activeGroups).forEach(g => {
                const c = document.createElement('div');
                c.className = "p-4 glass-panel rounded-2xl flex items-center justify-between active:scale-[0.98] transition-transform border border-pink-500/20 bg-pink-900/10";
                c.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-pink-600/20 flex items-center justify-center font-bold text-xs text-pink-400"><i data-lucide="users" class="w-4 h-4"></i></div>
                        <div>
                            <p class="font-bold text-sm leading-tight text-pink-100">${g.name}</p>
                            <p class="text-[9px] text-pink-400/80 font-bold uppercase tracking-widest">${g.members.length} Members</p>
                        </div>
                    </div>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-pink-500"></i>
                `;
                c.onclick = () => openChat(g.id, g.name, true);
                els.groupsGrid.appendChild(c);
            });

            // Render Users
            els.usersGrid.innerHTML = '';
            networkUsers.forEach(u => {
                const c = document.createElement('div');
                c.className = "p-4 glass-panel rounded-2xl flex items-center justify-between active:scale-[0.98] transition-transform border border-white/5";
                c.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-slate-800 flex items-center justify-center font-bold text-xs text-indigo-400">${u.username[0].toUpperCase()}</div>
                        <div>
                            <p class="font-bold text-sm leading-tight">${u.username}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">ID: ${u.code}</p>
                        </div>
                    </div>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-slate-700"></i>
                `;
                c.onclick = () => openChat(u.peerId, u.username, false);
                els.usersGrid.appendChild(c);
            });
            lucide.createIcons();
        }

        // --- Pairing Logic ---
        els.pairingBtn.onclick = () => els.pairingModal.classList.remove('hidden');
        els.closePairing.onclick = () => els.pairingModal.classList.add('hidden');
        els.connectCodeBtn.onclick = () => connectByCode(els.targetCodeInput.value.trim().toUpperCase());

        async function connectByCode(code) {
            if(!code) return showToast("Enter code", "error");
            showToast("Resolving link...");
            
            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'pairing_codes', code));
            if(snap.exists()) {
                const data = snap.data();
                
                if (data.type === 'group') {
                    // Join Group
                    const gRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'groups', data.groupId);
                    const gSnap = await getDoc(gRef);
                    if (gSnap.exists()) {
                        const gData = gSnap.data();
                        // Add self to array
                        const newMember = { peerId: myPeerId, username: myUsername };
                        const isMember = gData.members.find(m => m.peerId === myPeerId);
                        if (!isMember) {
                            await updateDoc(gRef, { members: arrayUnion(newMember) });
                            gData.members.push(newMember);
                        }
                        joinLocalGroup(gData);
                        openChat(gData.id, gData.name, true);
                        showToast(`Joined ${gData.name}`);
                    }
                } else {
                    // Direct User Link
                    openChat(data.peerId, data.username, false);
                    showToast("Linked to User!");
                }
                els.pairingModal.classList.add('hidden');
                els.targetCodeInput.value = '';
            } else {
                showToast("Code not found", "error");
            }
        }

        // --- Chat Interface ---
        function renderSubtitle() {
            if (currentChatTarget && currentChatTarget.startsWith('G-')) {
                const grp = activeGroups[currentChatTarget];
                els.chatSubtitle.textContent = grp ? `${grp.members.length} MEMBERS IN MESH` : 'GROUP MESH';
                els.chatAvatar.innerHTML = `<i data-lucide="users" class="w-4 h-4"></i>`;
                els.chatAvatar.className = "w-8 h-8 rounded-full bg-pink-600 flex items-center justify-center text-white";
            } else {
                els.chatSubtitle.textContent = "P2P DIRECT ENCRYPTED";
                els.chatAvatar.innerHTML = els.chatUsername.textContent[0].toUpperCase();
                els.chatAvatar.className = "w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-xs";
            }
            lucide.createIcons();
        }

        function openChat(targetId, name, isGroup) {
            currentChatTarget = targetId;
            els.chatUsername.textContent = name;
            renderSubtitle();
            
            els.chatPanel.style.transform = 'translateY(0)';
            renderMsgs();
        }

        els.closeChat.onclick = () => { 
            els.chatPanel.style.transform = 'translateY(100%)'; 
            currentChatTarget = null; 
            els.attachTray.classList.add('hidden');
        };

        // --- Messaging ---
        els.sendBtn.onclick = () => {
            const val = els.messageInput.value.trim();
            if(!val || !currentChatTarget) return;
            els.messageInput.value = '';
            sendPayload({ type: 'text', content: val });
        };

        function sendPayload(payload) {
            const fullMsg = { ...payload, sender: myPeerId, senderName: myUsername, ts: Date.now() };
            
            if (currentChatTarget.startsWith('G-')) {
                fullMsg.groupId = currentChatTarget;
                const grp = activeGroups[currentChatTarget];
                if(grp) {
                    grp.members.forEach(m => {
                        if (m.peerId !== myPeerId) {
                            const conn = peer.connect(m.peerId);
                            conn.on('open', () => conn.send(fullMsg));
                        }
                    });
                }
                saveMsg(currentChatTarget, { ...fullMsg, isMe: true });
            } else {
                const conn = peer.connect(currentChatTarget);
                conn.on('open', () => conn.send(fullMsg));
                saveMsg(currentChatTarget, { ...fullMsg, isMe: true });
            }
        }

        function handleIncomingData(fromPeerId, data) {
            const target = data.groupId ? data.groupId : fromPeerId;
            saveMsg(target, { ...data, isMe: false });
            
            if (currentChatTarget === target) {
                renderMsgs();
            } else {
                const name = data.groupId ? (activeGroups[data.groupId]?.name || 'Group') : (data.senderName || 'Peer');
                showToast(`New message in ${name}`);
            }
        }

        function saveMsg(targetId, msg) {
            if(!chatHistories[targetId]) chatHistories[targetId] = [];
            chatHistories[targetId].push(msg);
            if(currentChatTarget === targetId) renderMsgs();
        }

        function renderMsgs() {
            const msgs = chatHistories[currentChatTarget] || [];
            els.chatMessages.innerHTML = '';
            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = `max-w-[85%] px-4 py-3 rounded-2xl text-[13px] flex flex-col ${m.isMe ? 'bg-indigo-600 self-end rounded-br-none' : 'bg-slate-800 self-start rounded-bl-none border border-white/5'}`;
                
                let header = '';
                if (!m.isMe && currentChatTarget.startsWith('G-')) {
                    header = `<span class="text-[9px] font-black uppercase tracking-widest text-indigo-300 mb-1">${m.senderName}</span>`;
                }

                let content = '';
                if (m.type === 'text') {
                    content = `<span>${m.content}</span>`;
                } else if (m.type === 'gif') {
                    content = `<img src="${m.url}" class="rounded-lg mt-1 max-h-48 object-cover">`;
                } else if (m.type === 'file') {
                    // Blob reconstruction not fully supported in mesh without blobbing to all, simulated link
                    content = `<span class="italic text-slate-400">File attached: ${m.filename}</span>`; 
                }

                div.innerHTML = header + content;
                els.chatMessages.appendChild(div);
            });
            els.chatMessages.scrollTop = els.chatMessages.scrollHeight;
        }

        // --- Attachments & GIF (Tenor) ---
        els.attachBtn.onclick = () => els.attachTray.classList.toggle('hidden');
        
        els.trayFileBtn.onclick = () => {
            els.attachTray.classList.add('hidden');
            els.fileInput.click();
        };

        els.fileInput.onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                showToast("File sending simulated for mesh network", "info");
                sendPayload({ type: 'file', filename: f.name });
            }
        };

        els.trayGifBtn.onclick = () => {
            els.attachTray.classList.add('hidden');
            els.gifModal.classList.remove('hidden');
            setTimeout(() => els.gifModal.style.transform = 'translateY(0)', 10);
            fetchGifs('trending'); // Load initial
        };

        els.closeGif.onclick = () => {
            els.gifModal.style.transform = 'translateY(100%)';
            setTimeout(() => els.gifModal.classList.add('hidden'), 300);
        };

        let gifTimer;
        els.gifSearch.onkeyup = (e) => {
            clearTimeout(gifTimer);
            gifTimer = setTimeout(() => {
                const q = e.target.value.trim();
                fetchGifs(q || 'trending');
            }, 500);
        };

        async function fetchGifs(query) {
            els.gifResults.innerHTML = '<div class="col-span-2 text-center text-slate-500 text-xs py-10"><i data-lucide="loader" class="w-6 h-6 animate-spin mx-auto"></i></div>';
            lucide.createIcons();
            try {
                const endpoint = query === 'trending' ? 'trending' : 'search';
                const res = await fetch(`https://g.tenor.com/v1/${endpoint}?q=${encodeURIComponent(query)}&key=${TENOR_API_KEY}&limit=20`);
                const data = await res.json();
                
                els.gifResults.innerHTML = '';
                data.results.forEach(gif => {
                    const img = document.createElement('img');
                    img.src = gif.media[0].tinygif.url; // Use smaller version for grid
                    img.onclick = () => {
                        sendPayload({ type: 'gif', url: gif.media[0].gif.url });
                        els.closeGif.onclick();
                    };
                    els.gifResults.appendChild(img);
                });
            } catch (err) {
                els.gifResults.innerHTML = '<div class="col-span-2 text-center text-rose-500 text-xs py-10">Failed to load GIFs</div>';
            }
        }

        // --- Multi-Party Calling ---
        function createAvatarNode(id, name) {
            const el = document.createElement('div');
            el.id = `avatar-${id}`;
            el.className = "w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center text-2xl font-bold border-2 border-indigo-500 pulse-ring relative";
            el.innerHTML = `
                ${name[0].toUpperCase()}
                <div class="absolute -bottom-2 bg-slate-900 px-2 py-0.5 rounded text-[8px] uppercase tracking-widest border border-white/10 whitespace-nowrap">${name}</div>
            `;
            return el;
        }

        els.callBtn.onclick = async () => {
            if(!currentChatTarget) return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                els.callOverlay.classList.remove('hidden');
                els.callAvatars.innerHTML = ''; // Clear grid
                els.callAudioContainer.innerHTML = ''; 
                
                if (currentChatTarget.startsWith('G-')) {
                    // Group Call
                    els.callName.textContent = activeGroups[currentChatTarget]?.name || "Group Call";
                    els.callStatus.textContent = "Initiating Mesh Call...";
                    
                    const grp = activeGroups[currentChatTarget];
                    if(grp) {
                        grp.members.forEach(m => {
                            if (m.peerId !== myPeerId) {
                                els.callAvatars.appendChild(createAvatarNode(m.peerId, m.username));
                                const call = peer.call(m.peerId, localStream);
                                setupCallEvents(call, m.peerId);
                            }
                        });
                    }
                } else {
                    // Direct Call
                    els.callName.textContent = els.chatUsername.textContent;
                    els.callStatus.textContent = "Calling...";
                    els.callAvatars.appendChild(createAvatarNode(currentChatTarget, els.chatUsername.textContent));
                    
                    const call = peer.call(currentChatTarget, localStream);
                    setupCallEvents(call, currentChatTarget);
                }
            } catch (e) {
                showToast("Microphone access denied", "error");
            }
        };

        function handleIncomingCall(call) {
            activeCalls.push(call);
            els.callOverlay.classList.remove('hidden');
            
            const callerName = networkUsers.find(u => u.peerId === call.peer)?.username || "Unknown";
            els.callName.textContent = callerName;
            els.callStatus.textContent = "Incoming Call";
            
            els.callAvatars.innerHTML = '';
            els.callAvatars.appendChild(createAvatarNode(call.peer, callerName));
            els.acceptCallBtn.classList.remove('hidden');
        }

        els.acceptCallBtn.onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                els.acceptCallBtn.classList.add('hidden');
                els.callStatus.textContent = "Live Mesh Connected";
                
                activeCalls.forEach(call => {
                    call.answer(localStream);
                    setupCallEvents(call, call.peer);
                });
            } catch(e) {
                showToast("Microphone required to answer", "error");
                endCall();
            }
        };

        function setupCallEvents(call, peerId) {
            activeCalls.push(call);
            call.on('stream', rStream => {
                els.callStatus.textContent = "Live Audio Active";
                
                // Ensure avatar is solid
                const av = document.getElementById(`avatar-${peerId}`);
                if(av) av.classList.add('border-emerald-500');

                // Create dedicated audio node for this stream
                const audioNode = document.createElement('audio');
                audioNode.autoplay = true;
                audioNode.srcObject = rStream;
                audioNode.id = `audio-${peerId}`;
                els.callAudioContainer.appendChild(audioNode);
            });
            
            call.on('close', () => {
                const audio = document.getElementById(`audio-${peerId}`);
                if(audio) audio.remove();
                const av = document.getElementById(`avatar-${peerId}`);
                if(av) av.remove();
                
                activeCalls = activeCalls.filter(c => c !== call);
                if(activeCalls.length === 0) endCall();
            });
        }

        function endCall() {
            activeCalls.forEach(c => c.close());
            activeCalls = [];
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            els.callOverlay.classList.add('hidden');
            els.callAudioContainer.innerHTML = '';
            els.callAvatars.innerHTML = '';
            els.acceptCallBtn.classList.add('hidden');
        }
        els.endCallBtn.onclick = endCall;

        // Startup
        start();
        lucide.createIcons();
    </script>
</body>
</html>
