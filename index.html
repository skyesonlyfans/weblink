<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebLink by Skye &lt;3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        body {
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Mobile Safari Height Fix */
        .h-screen-ios {
            height: 100vh;
            height: -webkit-fill-available;
        }

        .pairing-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft { animation: pulse-soft 3s infinite; }

        #qrcode img {
            margin: 0 auto;
            border-radius: 12px;
            padding: 8px;
            background: white;
        }
    </style>
</head>
<body class="h-screen-ios bg-slate-950 text-slate-100 font-sans overflow-hidden flex flex-col selection:bg-pink-500/30">

    <!-- Subtle Background Glow -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-pink-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- Header: Minimal & Slim for Mobile -->
    <header class="sticky top-0 p-3 md:p-4 glass-panel flex justify-between items-center z-40 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-br from-pink-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-pink-500/20">
                <i data-lucide="radio" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-pink-300 to-indigo-300 bg-clip-text text-transparent">WebLink</h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="pairing-btn" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-full transition-colors border border-white/5">
                <i data-lucide="qr-code" class="w-5 h-5 text-indigo-300"></i>
            </button>
            <div id="my-profile" class="hidden flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-full border border-white/10">
                <span id="my-username" class="text-xs font-semibold text-slate-300 truncate max-w-[80px]"></span>
            </div>
        </div>
    </header>

    <!-- Main View -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-24 relative z-10">
        <div class="max-w-2xl mx-auto space-y-6">
            
            <!-- Connection Status -->
            <div class="flex items-center justify-between px-1">
                <h2 class="text-sm font-medium text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    Live Network
                </h2>
                <span id="network-count" class="text-[10px] font-bold text-slate-500 bg-slate-900/50 px-2 py-0.5 rounded border border-white/5">0 PEERS</span>
            </div>

            <!-- Users Grid -->
            <div id="users-grid" class="grid grid-cols-1 gap-3">
                <!-- User items -->
            </div>

            <!-- Scanning State -->
            <div id="empty-state" class="flex flex-col items-center justify-center py-20 text-slate-500 space-y-4">
                <div class="relative">
                    <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center animate-pulse-soft">
                        <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-slate-700"></i>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-sm font-medium">Listening for broadcasts...</p>
                    <p class="text-xs text-slate-600 mt-1">Tap the QR icon to pair manualy</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Navigation / Pairing Modal -->
    <div id="pairing-modal" class="fixed inset-0 z-[60] hidden bg-slate-950/80 backdrop-blur-md p-6 flex items-center justify-center">
        <div class="pairing-card w-full max-w-sm rounded-[32px] p-8 border border-white/10 shadow-2xl space-y-8">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">Pair Device</h3>
                <button id="close-pairing" class="p-2 bg-slate-800 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <div class="space-y-6 text-center">
                <div id="qrcode" class="mx-auto inline-block bg-white p-3 rounded-2xl shadow-xl"></div>
                
                <div class="space-y-2">
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-tighter">Your Link Code</p>
                    <div id="pairing-code-display" class="text-4xl font-black tracking-widest text-indigo-400 font-mono">000000</div>
                </div>

                <div class="pt-4 border-t border-white/5 space-y-4">
                    <p class="text-sm text-slate-400">Connect to someone else:</p>
                    <div class="flex gap-2">
                        <input type="tel" id="target-code-input" maxlength="6" class="flex-1 bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-center text-xl font-mono tracking-widest focus:ring-2 focus:ring-pink-500 outline-none" placeholder="6-digit code">
                        <button id="connect-code-btn" class="bg-pink-600 px-6 rounded-xl font-bold hover:bg-pink-500 transition-colors">Go</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- P2P Chat Slide-over -->
    <div id="chat-panel" class="fixed inset-0 z-50 transform translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] flex flex-col bg-slate-950">
        <!-- Header -->
        <div class="p-4 glass-panel border-b border-white/5 flex items-center justify-between sticky top-0">
            <div class="flex items-center gap-3">
                <button id="close-chat" class="p-2 -ml-2 text-slate-400"><i data-lucide="chevron-down"></i></button>
                <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center font-bold text-sm" id="chat-avatar">?</div>
                <div>
                    <h4 id="chat-username" class="font-bold text-sm leading-none">User</h4>
                    <p class="text-[10px] text-emerald-400 mt-1 uppercase tracking-widest font-bold">Encrypted</p>
                </div>
            </div>
            <button id="call-btn" class="w-10 h-10 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center"><i data-lucide="phone" class="w-5 h-5"></i></button>
        </div>

        <!-- Messages -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col"></div>

        <!-- Input -->
        <div class="p-3 pb-8 md:pb-4 border-t border-white/5 bg-slate-900/50 flex gap-2 items-center">
            <button id="attach-btn" class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-slate-400"><i data-lucide="plus"></i></button>
            <input type="file" id="file-input" class="hidden">
            <div class="flex-1 bg-slate-950 border border-white/10 rounded-2xl px-4 py-3">
                <input id="message-input" type="text" class="w-full bg-transparent outline-none text-sm" placeholder="Message...">
            </div>
            <button id="send-btn" class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-600/20"><i data-lucide="send" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- Minimal Login -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-8 text-center">
        <div class="w-20 h-20 bg-gradient-to-tr from-pink-500 to-indigo-600 rounded-3xl flex items-center justify-center mb-8 shadow-2xl shadow-pink-500/20">
            <i data-lucide="radio" class="w-10 h-10 text-white animate-pulse"></i>
        </div>
        <h2 class="text-3xl font-black mb-2">WebLink</h2>
        <p class="text-slate-500 text-sm mb-12">Private P2P Discovery & Chat</p>
        
        <form id="login-form" class="w-full max-w-xs space-y-4">
            <input type="text" id="username-input" required maxlength="15" class="w-full bg-slate-900 border border-white/10 rounded-2xl px-6 py-4 text-center text-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Your Name">
            <button type="submit" class="w-full py-4 bg-white text-black font-bold rounded-2xl shadow-xl active:scale-95 transition-transform">Get Started</button>
        </form>
    </div>

    <!-- Call / Incoming Call -->
    <div id="call-overlay" class="fixed inset-0 z-[110] hidden bg-slate-950 p-12 flex flex-col items-center justify-center space-y-8">
        <audio id="remote-audio" autoplay></audio>
        <div class="w-32 h-32 bg-slate-900 rounded-full flex items-center justify-center text-4xl font-bold border-4 border-indigo-500/30" id="call-avatar">?</div>
        <div class="text-center">
            <h3 id="call-name" class="text-2xl font-bold">User</h3>
            <p id="call-status" class="text-slate-500">Calling...</p>
        </div>
        <div class="flex gap-6 pt-12">
            <button id="end-call-btn" class="w-20 h-20 bg-rose-600 rounded-full flex items-center justify-center"><i data-lucide="phone-off" class="w-8 h-8"></i></button>
            <button id="accept-call-btn" class="hidden w-20 h-20 bg-emerald-600 rounded-full flex items-center justify-center"><i data-lucide="phone" class="w-8 h-8"></i></button>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-24 left-4 right-4 z-[120] space-y-2 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase & State ---
        const firebaseConfig = {
            apiKey: "AIzaSyDd5267BUf3xVrjvUsaHvXZBMCZ_dHxtt4",
            authDomain: "weblink-3cb66.firebaseapp.com",
            projectId: "weblink-3cb66",
            storageBucket: "weblink-3cb66.firebasestorage.app",
            messagingSenderId: "148181069266",
            appId: "1:148181069266:web:9d4f8b72d801b3af0eac0b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "weblink-v2";

        let myUsername = "";
        let peer = null;
        let myPeerId = null;
        let myNumericCode = "";
        let networkUsers = [];
        let chatHistories = {};
        let currentPeerId = null;
        let localStream = null;
        let currentCall = null;

        // --- UI Logic ---
        const els = {
            loginOverlay: document.getElementById('login-overlay'),
            loginForm: document.getElementById('login-form'),
            usernameInput: document.getElementById('username-input'),
            myUsernameDisplay: document.getElementById('my-username'),
            myProfile: document.getElementById('my-profile'),
            usersGrid: document.getElementById('users-grid'),
            emptyState: document.getElementById('empty-state'),
            networkCount: document.getElementById('network-count'),
            pairingBtn: document.getElementById('pairing-btn'),
            pairingModal: document.getElementById('pairing-modal'),
            closePairing: document.getElementById('close-pairing'),
            pairingCodeDisplay: document.getElementById('pairing-code-display'),
            targetCodeInput: document.getElementById('target-code-input'),
            connectCodeBtn: document.getElementById('connect-code-btn'),
            chatPanel: document.getElementById('chat-panel'),
            closeChat: document.getElementById('close-chat'),
            chatUsername: document.getElementById('chat-username'),
            chatAvatar: document.getElementById('chat-avatar'),
            chatMessages: document.getElementById('chat-messages'),
            messageInput: document.getElementById('message-input'),
            sendBtn: document.getElementById('send-btn'),
            attachBtn: document.getElementById('attach-btn'),
            fileInput: document.getElementById('file-input'),
            callBtn: document.getElementById('call-btn'),
            callOverlay: document.getElementById('call-overlay'),
            callName: document.getElementById('call-name'),
            callStatus: document.getElementById('call-status'),
            acceptCallBtn: document.getElementById('accept-call-btn'),
            endCallBtn: document.getElementById('end-call-btn'),
            remoteAudio: document.getElementById('remote-audio'),
            toastContainer: document.getElementById('toast-container')
        };

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `p-4 rounded-2xl ${type === 'error' ? 'bg-rose-500' : 'bg-slate-800'} text-white text-xs font-bold shadow-2xl flex items-center gap-2 animate-bounce-in`;
            t.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'info'}" class="w-4 h-4"></i> ${msg}`;
            els.toastContainer.appendChild(t);
            lucide.createIcons();
            setTimeout(() => t.remove(), 4000);
        }

        // --- Core Init ---
        async function start() {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, u => { if(u) setupDiscovery(); });
        }

        els.loginForm.onsubmit = e => {
            e.preventDefault();
            myUsername = els.usernameInput.value.trim();
            els.loginOverlay.style.opacity = '0';
            setTimeout(() => els.loginOverlay.style.display = 'none', 500);
            els.myProfile.classList.remove('hidden');
            els.myUsernameDisplay.textContent = myUsername;
            initPeer();
        };

        function generateNumericCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function initPeer() {
            peer = new Peer(undefined, { debug: 1 });
            peer.on('open', id => {
                myPeerId = id;
                myNumericCode = generateNumericCode();
                els.pairingCodeDisplay.textContent = myNumericCode;
                
                // QR Code
                const pairingUrl = `${window.location.origin}${window.location.pathname}?code=${myNumericCode}`;
                new QRCode(document.getElementById("qrcode"), {
                    text: pairingUrl,
                    width: 160,
                    height: 160,
                    colorDark : "#0f172a",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                announce();
                setInterval(announce, 15000);
                
                // Check if we arrived via a link
                const params = new URLSearchParams(window.location.search);
                const joinCode = params.get('code');
                if(joinCode) connectByCode(joinCode);
            });

            peer.on('connection', conn => {
                conn.on('data', data => handleData(conn.peer, data));
            });

            peer.on('call', call => {
                currentCall = call;
                els.callOverlay.classList.remove('hidden');
                els.callStatus.textContent = "Incoming Call...";
                els.acceptCallBtn.classList.remove('hidden');
                els.callName.textContent = networkUsers.find(u => u.peerId === call.peer)?.username || "User";
            });
        }

        async function announce() {
            if(!auth.currentUser || !myPeerId) return;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'presence', auth.currentUser.uid);
            await setDoc(ref, {
                uid: auth.currentUser.uid,
                username: myUsername,
                peerId: myPeerId,
                code: myNumericCode,
                ts: Date.now()
            });

            // Maintain the 6-digit lookup index
            const lookupRef = doc(db, 'artifacts', appId, 'public', 'data', 'lookup', myNumericCode);
            await setDoc(lookupRef, { peerId: myPeerId, ts: Date.now() });
        }

        function setupDiscovery() {
            const col = collection(db, 'artifacts', appId, 'public', 'data', 'presence');
            onSnapshot(col, snap => {
                const now = Date.now();
                networkUsers = [];
                snap.forEach(d => {
                    const data = d.data();
                    if(data.uid !== auth.currentUser.uid && (now - data.ts < 45000)) {
                        networkUsers.push(data);
                    }
                });
                render();
            });
        }

        function render() {
            els.networkCount.textContent = `${networkUsers.length} ONLINE`;
            els.emptyState.style.display = networkUsers.length ? 'none' : 'flex';
            els.usersGrid.innerHTML = '';
            
            networkUsers.forEach(u => {
                const div = document.createElement('div');
                div.className = "p-4 glass-panel rounded-2xl flex items-center justify-between active:scale-[0.98] transition-transform";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center font-bold text-xs">${u.username[0].toUpperCase()}</div>
                        <div>
                            <p class="font-bold text-sm">${u.username}</p>
                            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">${u.code}</p>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-600"></i>
                `;
                div.onclick = () => openChat(u);
                els.usersGrid.appendChild(div);
            });
            lucide.createIcons();
        }

        // --- Feature Logic ---
        els.pairingBtn.onclick = () => els.pairingModal.classList.remove('hidden');
        els.closePairing.onclick = () => els.pairingModal.classList.add('hidden');

        els.connectCodeBtn.onclick = () => connectByCode(els.targetCodeInput.value);

        async function connectByCode(code) {
            if(!code || code.length !== 6) return showToast("Enter 6-digit code", "error");
            
            showToast("Searching for peer...");
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'lookup', code);
            const snap = await getDoc(ref);
            
            if(snap.exists()) {
                const targetPeerId = snap.data().peerId;
                // If we don't have the user object yet, we can't show the name properly
                // so we just use the code as temporary name
                openChat({ peerId: targetPeerId, username: `Peer ${code}`, code });
                els.pairingModal.classList.add('hidden');
                showToast("Connected!");
            } else {
                showToast("Code not found or expired", "error");
            }
        }

        function openChat(user) {
            currentPeerId = user.peerId;
            els.chatUsername.textContent = user.username;
            els.chatAvatar.textContent = user.username[0].toUpperCase();
            els.chatPanel.style.transform = 'translateY(0)';
            renderMessages();
        }

        els.closeChat.onclick = () => {
            els.chatPanel.style.transform = 'translateY(100%)';
            currentPeerId = null;
        };

        els.sendBtn.onclick = () => {
            const text = els.messageInput.value.trim();
            if(!text || !currentPeerId) return;
            els.messageInput.value = '';
            
            const conn = peer.connect(currentPeerId);
            conn.on('open', () => {
                const msg = { type: 'text', content: text, sender: 'me', ts: Date.now() };
                conn.send(msg);
                saveMsg(currentPeerId, msg);
            });
        };

        function handleData(fromPeerId, data) {
            if(data.type === 'text') {
                saveMsg(fromPeerId, { ...data, sender: 'them' });
                if(currentPeerId === fromPeerId) renderMessages();
                else showToast(`New message from ${networkUsers.find(u => u.peerId === fromPeerId)?.username || 'Peer'}`);
            }
        }

        function saveMsg(pid, msg) {
            if(!chatHistories[pid]) chatHistories[pid] = [];
            chatHistories[pid].push(msg);
            if(currentPeerId === pid) renderMessages();
        }

        function renderMessages() {
            const msgs = chatHistories[currentPeerId] || [];
            els.chatMessages.innerHTML = '';
            msgs.forEach(m => {
                const isMe = m.sender === 'me';
                const div = document.createElement('div');
                div.className = `max-w-[85%] px-4 py-2 rounded-2xl text-sm ${isMe ? 'bg-indigo-600 self-end rounded-br-none' : 'bg-slate-800 self-start rounded-bl-none'}`;
                div.textContent = m.content;
                els.chatMessages.appendChild(div);
            });
            els.chatMessages.scrollTop = els.chatMessages.scrollHeight;
        }

        els.callBtn.onclick = async () => {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentCall = peer.call(currentPeerId, localStream);
            els.callOverlay.classList.remove('hidden');
            els.callStatus.textContent = "Calling...";
            setupCall(currentCall);
        };

        els.acceptCallBtn.onclick = async () => {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentCall.answer(localStream);
            els.acceptCallBtn.classList.add('hidden');
            setupCall(currentCall);
        };

        function setupCall(call) {
            call.on('stream', remote => {
                els.remoteAudio.srcObject = remote;
                els.callStatus.textContent = "Connected";
            });
            call.on('close', () => endCall());
        }

        function endCall() {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            els.callOverlay.classList.add('hidden');
            els.remoteAudio.srcObject = null;
        }
        els.endCallBtn.onclick = endCall;

        start();
        lucide.createIcons();
    </script>
</body>
</html>
