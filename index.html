<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebLink by Skye &lt;3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        body {
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            -webkit-tap-highlight-color: transparent;
        }

        .h-screen-ios {
            height: 100vh;
            height: -webkit-fill-available;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .pairing-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 0.98));
            max-width: calc(100vw - 32px);
        }

        #qrcode img {
            margin: 0 auto;
            border-radius: 12px;
            padding: 6px;
            background: white;
            max-width: 130px; /* Reduced for mobile fit */
            height: auto;
        }

        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(236, 72, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen-ios bg-slate-950 text-slate-100 font-sans overflow-hidden flex flex-col">

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-pink-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px]"></div>
    </div>

    <header class="sticky top-0 p-4 glass-panel flex justify-between items-center z-40 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-br from-pink-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-pink-500/20">
                <i data-lucide="radio" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-pink-300 to-indigo-300 bg-clip-text text-transparent">WebLink</h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="pairing-btn" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-full transition-colors border border-white/5">
                <i data-lucide="qr-code" class="w-5 h-5 text-indigo-300"></i>
            </button>
            <div id="my-profile" class="hidden flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-full border border-white/10">
                <span id="my-username-display" class="text-xs font-semibold text-slate-300 truncate max-w-[70px]"></span>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24 relative z-10">
        <div class="max-w-2xl mx-auto space-y-6">
            <div class="flex items-center justify-between px-1">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    Live Network
                </h2>
                <span id="network-count" class="text-[10px] font-bold text-slate-400">0 PEERS</span>
            </div>
            <div id="users-grid" class="grid grid-cols-1 gap-3"></div>
            <div id="empty-state" class="flex flex-col items-center justify-center py-16 text-slate-500 space-y-4">
                <i data-lucide="radar" class="w-10 h-10 text-slate-800 animate-spin-slow"></i>
                <div class="text-center">
                    <p class="text-sm font-medium">Scanning for devices...</p>
                    <p class="text-[10px] text-slate-600 mt-1 uppercase tracking-wider">Use QR for non-local pairing</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Refined Pairing Modal -->
    <div id="pairing-modal" class="fixed inset-0 z-[60] hidden bg-slate-950/90 backdrop-blur-xl p-4 flex items-center justify-center">
        <div class="pairing-card w-full rounded-[28px] p-5 border border-white/10 shadow-2xl flex flex-col space-y-5">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-black tracking-tight">Pairing Center</h3>
                <button id="close-pairing" class="p-2 bg-slate-800 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <div class="space-y-4 text-center">
                <div id="qrcode" class="mx-auto p-2 bg-white rounded-xl inline-block shadow-lg"></div>
                
                <div class="space-y-0.5">
                    <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest">Broadcast Code</p>
                    <div id="pairing-code-text" class="text-3xl font-black tracking-[0.2em] text-indigo-400 font-mono">------</div>
                </div>

                <!-- Fixed Mobile Fit Pairing Section -->
                <div class="pt-4 border-t border-white/5 space-y-3">
                    <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wide">Link Remote Device</p>
                    <div class="flex flex-col gap-2">
                        <input type="tel" id="target-code-input" maxlength="6" 
                            class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-center text-xl font-mono tracking-[0.3em] focus:ring-2 focus:ring-pink-500 outline-none placeholder:tracking-normal placeholder:text-slate-700" 
                            placeholder="000000">
                        <button id="connect-code-btn" 
                            class="w-full bg-indigo-600 py-3 rounded-xl font-black hover:bg-indigo-500 active:scale-[0.97] transition-all text-xs uppercase tracking-widest shadow-lg shadow-indigo-600/20">
                            Confirm Link
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Slide-over -->
    <div id="chat-panel" class="fixed inset-0 z-50 transform translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] flex flex-col bg-slate-950">
        <div class="p-4 glass-panel border-b border-white/5 flex items-center justify-between sticky top-0">
            <div class="flex items-center gap-3">
                <button id="close-chat" class="p-2 -ml-2 text-slate-400"><i data-lucide="chevron-down"></i></button>
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-xs" id="chat-avatar">?</div>
                <div>
                    <h4 id="chat-username" class="font-bold text-sm leading-none">User</h4>
                    <p class="text-[9px] text-emerald-400 mt-1 uppercase font-black tracking-widest">Active Connection</p>
                </div>
            </div>
            <button id="call-btn" class="w-9 h-9 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center active:scale-90 transition-transform"><i data-lucide="phone" class="w-4 h-4"></i></button>
        </div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col no-scrollbar"></div>
        <div class="p-3 pb-8 border-t border-white/5 bg-slate-900/50 flex gap-2 items-center">
            <div class="flex-1 bg-slate-950 border border-white/10 rounded-2xl px-4 py-3">
                <input id="message-input" type="text" class="w-full bg-transparent outline-none text-sm" placeholder="Message...">
            </div>
            <button id="send-btn" class="w-12 h-12 bg-pink-600 rounded-2xl flex items-center justify-center shadow-lg shadow-pink-600/20 active:scale-90 transition-transform"><i data-lucide="send" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- Login -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-8 text-center">
        <div class="w-16 h-16 bg-gradient-to-tr from-pink-500 to-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl pulse-ring">
            <i data-lucide="radio" class="w-8 h-8 text-white"></i>
        </div>
        <h2 class="text-2xl font-black mb-1 tracking-tighter">WebLink</h2>
        <p class="text-slate-500 text-[11px] uppercase tracking-widest mb-10">Private Discovery</p>
        <form id="login-form" class="w-full max-w-xs space-y-3">
            <input type="text" id="username-input" required maxlength="12" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-4 text-center text-lg font-bold outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Your Name">
            <button type="submit" class="w-full py-4 bg-white text-black font-black rounded-xl active:scale-95 transition-transform uppercase tracking-widest text-[10px]">Initialize</button>
        </form>
    </div>

    <!-- Call Overlay -->
    <div id="call-overlay" class="fixed inset-0 z-[110] hidden bg-slate-950/95 p-12 flex flex-col items-center justify-center space-y-8">
        <audio id="remote-audio" autoplay></audio>
        <div class="w-28 h-28 bg-slate-900 rounded-full flex items-center justify-center text-3xl font-bold border-4 border-indigo-500/30 pulse-ring" id="call-avatar-ov">?</div>
        <div class="text-center">
            <h3 id="call-name" class="text-xl font-black">User</h3>
            <p id="call-status" class="text-slate-500 font-medium">Ready</p>
        </div>
        <div class="flex gap-8 pt-8">
            <button id="end-call-btn" class="w-16 h-16 bg-rose-600 rounded-full flex items-center justify-center active:scale-90 transition-transform"><i data-lucide="phone-off" class="w-6 h-6 text-white"></i></button>
            <button id="accept-call-btn" class="hidden w-16 h-16 bg-emerald-600 rounded-full flex items-center justify-center active:scale-90 transition-transform"><i data-lucide="phone" class="w-6 h-6 text-white"></i></button>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 left-4 right-4 z-[120] space-y-2 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd5267BUf3xVrjvUsaHvXZBMCZ_dHxtt4",
            authDomain: "weblink-3cb66.firebaseapp.com",
            projectId: "weblink-3cb66",
            storageBucket: "weblink-3cb66.firebasestorage.app",
            messagingSenderId: "148181069266",
            appId: "1:148181069266:web:9d4f8b72d801b3af0eac0b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "weblink-v2";

        let myUsername = "";
        let peer = null;
        let myPeerId = null;
        let my6DigitCode = "";
        let networkUsers = [];
        let chatHistories = {};
        let currentPeerId = null;
        let localStream = null;
        let currentCall = null;

        const els = {
            loginOverlay: document.getElementById('login-overlay'),
            loginForm: document.getElementById('login-form'),
            usernameInput: document.getElementById('username-input'),
            myUsernameDisplay: document.getElementById('my-username-display'),
            myProfile: document.getElementById('my-profile'),
            usersGrid: document.getElementById('users-grid'),
            emptyState: document.getElementById('empty-state'),
            networkCount: document.getElementById('network-count'),
            pairingBtn: document.getElementById('pairing-btn'),
            pairingModal: document.getElementById('pairing-modal'),
            closePairing: document.getElementById('close-pairing'),
            pairingCodeText: document.getElementById('pairing-code-text'),
            targetCodeInput: document.getElementById('target-code-input'),
            connectCodeBtn: document.getElementById('connect-code-btn'),
            chatPanel: document.getElementById('chat-panel'),
            closeChat: document.getElementById('close-chat'),
            chatUsername: document.getElementById('chat-username'),
            chatAvatar: document.getElementById('chat-avatar'),
            chatMessages: document.getElementById('chat-messages'),
            messageInput: document.getElementById('message-input'),
            sendBtn: document.getElementById('send-btn'),
            callBtn: document.getElementById('call-btn'),
            callOverlay: document.getElementById('call-overlay'),
            callName: document.getElementById('call-name'),
            callStatus: document.getElementById('call-status'),
            acceptCallBtn: document.getElementById('accept-call-btn'),
            endCallBtn: document.getElementById('end-call-btn'),
            remoteAudio: document.getElementById('remote-audio'),
            toastContainer: document.getElementById('toast-container')
        };

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `p-3 rounded-xl ${type === 'error' ? 'bg-rose-500' : 'bg-slate-800'} text-white text-[10px] font-black uppercase tracking-widest shadow-2xl flex items-center gap-2 pointer-events-auto`;
            t.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'info'}" class="w-3 h-3"></i> ${msg}`;
            els.toastContainer.appendChild(t);
            lucide.createIcons();
            setTimeout(() => t.remove(), 3500);
        }

        async function start() {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, u => { if(u) setupDiscovery(); });
        }

        els.loginForm.onsubmit = e => {
            e.preventDefault();
            myUsername = els.usernameInput.value.trim();
            els.loginOverlay.style.opacity = '0';
            setTimeout(() => els.loginOverlay.style.display = 'none', 500);
            els.myProfile.classList.remove('hidden');
            els.myUsernameDisplay.textContent = myUsername;
            initPeer();
        };

        function initPeer() {
            peer = new Peer(undefined, { debug: 1 });
            peer.on('open', id => {
                myPeerId = id;
                my6DigitCode = Math.floor(100000 + Math.random() * 900000).toString();
                els.pairingCodeText.textContent = my6DigitCode;
                new QRCode(document.getElementById("qrcode"), {
                    text: `${window.location.origin}${window.location.pathname}?code=${my6DigitCode}`, 
                    width: 120, height: 120, colorDark : "#0f172a", colorLight : "#ffffff"
                });
                announce();
                setInterval(announce, 15000);
                const params = new URLSearchParams(window.location.search);
                if(params.get('code')) connectByCode(params.get('code'));
            });

            peer.on('connection', conn => {
                conn.on('data', data => handleIncomingData(conn.peer, data));
            });

            peer.on('call', call => {
                currentCall = call;
                els.callOverlay.classList.remove('hidden');
                els.callStatus.textContent = "Incoming call";
                els.acceptCallBtn.classList.remove('hidden');
                els.callName.textContent = networkUsers.find(u => u.peerId === call.peer)?.username || "Unknown";
            });
        }

        async function announce() {
            if(!auth.currentUser || !myPeerId) return;
            const pRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'weblink_presence', auth.currentUser.uid);
            await setDoc(pRef, { uid: auth.currentUser.uid, username: myUsername, peerId: myPeerId, code: my6DigitCode, ts: Date.now() });
            const lRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'pairing_codes', my6DigitCode);
            await setDoc(lRef, { peerId: myPeerId, username: myUsername, ts: Date.now() });
        }

        function setupDiscovery() {
            const col = collection(db, 'artifacts', APP_ID, 'public', 'data', 'weblink_presence');
            onSnapshot(col, snap => {
                const now = Date.now();
                networkUsers = [];
                snap.forEach(d => {
                    const data = d.data();
                    if(data.uid !== auth.currentUser.uid && (now - data.ts < 45000)) networkUsers.push(data);
                });
                render();
            });
        }

        function render() {
            els.networkCount.textContent = `${networkUsers.length} ONLINE`;
            els.emptyState.style.display = networkUsers.length ? 'none' : 'flex';
            els.usersGrid.innerHTML = '';
            networkUsers.forEach(u => {
                const c = document.createElement('div');
                c.className = "p-4 glass-panel rounded-2xl flex items-center justify-between active:scale-[0.98] transition-transform";
                c.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-slate-800 flex items-center justify-center font-bold text-xs text-indigo-400">${u.username[0].toUpperCase()}</div>
                        <div>
                            <p class="font-bold text-sm leading-tight">${u.username}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">${u.code}</p>
                        </div>
                    </div>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-slate-700"></i>
                `;
                c.onclick = () => openChat(u);
                els.usersGrid.appendChild(c);
            });
            lucide.createIcons();
        }

        els.pairingBtn.onclick = () => els.pairingModal.classList.remove('hidden');
        els.closePairing.onclick = () => els.pairingModal.classList.add('hidden');
        els.connectCodeBtn.onclick = () => connectByCode(els.targetCodeInput.value);

        async function connectByCode(code) {
            if(!code || code.length !== 6) return showToast("Enter 6 digits", "error");
            showToast("Linking...");
            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'pairing_codes', code));
            if(snap.exists()) {
                const data = snap.data();
                openChat({ peerId: data.peerId, username: data.username, code });
                els.pairingModal.classList.add('hidden');
                showToast("Linked!");
            } else {
                showToast("Link failed", "error");
            }
        }

        function openChat(user) {
            currentPeerId = user.peerId;
            els.chatUsername.textContent = user.username;
            els.chatAvatar.textContent = user.username[0].toUpperCase();
            els.chatPanel.style.transform = 'translateY(0)';
            renderMsgs();
        }

        els.closeChat.onclick = () => { els.chatPanel.style.transform = 'translateY(100%)'; currentPeerId = null; };

        els.sendBtn.onclick = () => {
            const val = els.messageInput.value.trim();
            if(!val || !currentPeerId) return;
            els.messageInput.value = '';
            const conn = peer.connect(currentPeerId);
            conn.on('open', () => {
                const m = { type: 'text', content: val, sender: 'me', ts: Date.now() };
                conn.send(m);
                saveMsg(currentPeerId, m);
            });
        };

        function handleIncomingData(pid, data) {
            if(data.type === 'text') {
                saveMsg(pid, { ...data, sender: 'them' });
                if(currentPeerId === pid) renderMsgs();
                else showToast(`New message from ${networkUsers.find(u => u.peerId === pid)?.username || 'Peer'}`);
            }
        }

        function saveMsg(pid, msg) {
            if(!chatHistories[pid]) chatHistories[pid] = [];
            chatHistories[pid].push(msg);
            if(currentPeerId === pid) renderMsgs();
        }

        function renderMsgs() {
            const msgs = chatHistories[currentPeerId] || [];
            els.chatMessages.innerHTML = '';
            msgs.forEach(m => {
                const isMe = m.sender === 'me';
                const div = document.createElement('div');
                div.className = `max-w-[85%] px-4 py-3 rounded-2xl text-[13px] ${isMe ? 'bg-indigo-600 self-end rounded-br-none' : 'bg-slate-800 self-start rounded-bl-none border border-white/5'}`;
                div.textContent = m.content;
                els.chatMessages.appendChild(div);
            });
            els.chatMessages.scrollTop = els.chatMessages.scrollHeight;
        }

        els.callBtn.onclick = async () => {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentCall = peer.call(currentPeerId, localStream);
            els.callOverlay.classList.remove('hidden');
            els.callStatus.textContent = "Calling...";
            setupCall(currentCall);
        };

        els.acceptCallBtn.onclick = async () => {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentCall.answer(localStream);
            els.acceptCallBtn.classList.add('hidden');
            setupCall(currentCall);
        };

        function setupCall(call) {
            call.on('stream', r => { els.remoteAudio.srcObject = r; els.callStatus.textContent = "Live"; });
            call.on('close', () => endCall());
            call.on('error', () => endCall());
        }

        function endCall() {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            els.callOverlay.classList.add('hidden');
            els.remoteAudio.srcObject = null;
        }
        els.endCallBtn.onclick = endCall;

        start();
        lucide.createIcons();
    </script>
</body>
</html>
